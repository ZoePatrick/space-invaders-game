<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👾 Space Invaders - Mit Sound & Musik</title>
    <style>
        * { touch-action: none; user-select: none; }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #000428 0%, #004e92 100%);
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        canvas {
            border: 3px solid #0f0;
            box-shadow: 0 0 30px #0f0, 0 0 60px #00d9ff;
            max-width: 100vw;
            max-height: 55vh;
        }
        .ui-panel {
            display: flex;
            gap: 30px;
            margin-bottom: 10px;
            color: #0f0;
            font-size: 18px;
            text-shadow: 0 0 10px #0f0;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #0f0;
            border-radius: 10px;
            font-size: 28px;
            color: #0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .btn:active { background: rgba(0, 255, 0, 0.5); }
        .fire-btn {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ff6b6b, #ff0000);
            border-color: #ff0000;
            font-size: 35px;
        }
        .audio-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
        }
        .audio-btn {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f0;
            border-radius: 50%;
            font-size: 20px;
            color: #0f0;
            cursor: pointer;
        }
        .level-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            border: 3px solid #0f0;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #0f0;
            display: none;
            z-index: 100;
        }
        .level-screen h2 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0f0;
        }
        .level-screen button {
            padding: 15px 30px;
            font-size: 20px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 20px;
        }
        @media (min-width: 600px) {
            .controls { display: none; }
        }
    </style>
</head>
<body>
    <div class="ui-panel">
        <div>Score: <span id="score">0</span></div>
        <div>Level: <span id="level">1</span></div>
        <div>Leben: <span id="lives">3</span></div>
        <div>Highscore: <span id="highscore">0</span></div>
    </div>
    
    <div class="audio-controls">
        <button class="audio-btn" id="musicToggle" onclick="toggleMusic()">🎵</button>
        <button class="audio-btn" id="sfxToggle" onclick="toggleSFX()">🔊</button>
    </div>
    
    <canvas id="game" width="700" height="550"></canvas>
    
    <div class="controls">
        <div class="btn" ontouchstart="moveLeft()" ontouchend="stopMove()">⬅️</div>
        <div class="btn fire-btn" ontouchstart="startFire()" ontouchend="stopFire()">🔥</div>
        <div class="btn" ontouchstart="moveRight()" ontouchend="stopMove()">➡️</div>
    </div>
    
    <div class="level-screen" id="levelScreen">
        <h2>🎉 Level <span id="nextLevel">2</span></h2>
        <p>Gut gemacht! Bereit für den nächsten Angriff?</p>
        <button onclick="nextLevel()">WEITER ▶️</button>
    </div>

    <script>
        // Audio Context
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        let musicEnabled = true;
        let sfxEnabled = true;
        let musicOscillator = null;
        let musicGain = null;
        let musicInterval = null;
        
        // Sound Effects
        function playShootSound() {
            if (!sfxEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }
        
        function playExplosionSound() {
            if (!sfxEnabled) return;
            // Create noise buffer
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            filter.type = 'lowpass';
            filter.frequency.value = 1000;
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            noise.start(audioCtx.currentTime);
        }
        
        function playPowerUpSound() {
            if (!sfxEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        }
        
        function playLevelUpSound() {
            if (!sfxEnabled) return;
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C major chord
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'square';
                osc.frequency.value = freq;
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
                gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + i * 0.1 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
                
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.5);
            });
        }
        
        // Background Music
        function startMusic() {
            if (!musicEnabled || musicOscillator) return;
            
            const baseFreq = 110; // A2
            const notes = [baseFreq, baseFreq * 1.5, baseFreq * 2, baseFreq * 1.33]; // A, E, A, F#
            let noteIndex = 0;
            
            function playNote() {
                if (!musicEnabled) return;
                
                musicOscillator = audioCtx.createOscillator();
                musicGain = audioCtx.createGain();
                
                musicOscillator.connect(musicGain);
                musicGain.connect(audioCtx.destination);
                
                musicOscillator.type = 'sawtooth';
                musicOscillator.frequency.value = notes[noteIndex];
                
                musicGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                musicGain.gain.exponentialRampToValueAtTime(0.02, audioCtx.currentTime + 0.4);
                
                musicOscillator.start(audioCtx.currentTime);
                musicOscillator.stop(audioCtx.currentTime + 0.5);
                
                noteIndex = (noteIndex + 1) % notes.length;
                
                musicOscillator.onended = () => {
                    musicOscillator = null;
                    if (musicEnabled) {
                        setTimeout(playNote, 100);
                    }
                };
            }
            
            playNote();
        }
        
        function stopMusic() {
            musicEnabled = false;
            if (musicOscillator) {
                try {
                    musicOscillator.stop();
                } catch(e) {}
            }
        }
        
        function toggleMusic() {
            musicEnabled = !musicEnabled;
            document.getElementById('musicToggle').textContent = musicEnabled ? '🎵' : '🔇';
            if (musicEnabled) startMusic();
        }
        
        function toggleSFX() {
            sfxEnabled = !sfxEnabled;
            document.getElementById('sfxToggle').textContent = sfxEnabled ? '🔊' : '🔈';
        }
        
        // Start music on first interaction
        document.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            startMusic();
        }, { once: true });
        
        // Game code
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let score = 0, level = 1, lives = 3;
        let highscore = localStorage.getItem('spaceInvadersAudioHighscore') || 0;
        document.getElementById('highscore').textContent = highscore;
        
        const player = {
            x: canvas.width / 2 - 30,
            y: canvas.height - 70,
            width: 60,
            height: 40,
            speed: 0,
            shield: false,
            rapidFire: false,
            tripleShot: false,
            megaBomb: false
        };
        
        const bullets = [];
        let lastShot = 0;
        let isFiring = false; // For autofire
        
        let invaders = [];
        let invaderDirection = 1;
        let invaderSpeed = 0.3;
        
        const powerUps = [];
        const powerUpTypes = [
            { type: 'rapid', emoji: '⚡', duration: 5000 },
            { type: 'triple', emoji: '🔱', duration: 5000 },
            { type: 'shield', emoji: '🛡️', duration: 8000 },
            { type: 'bomb', emoji: '💣', duration: 0 }
        ];
        
        const particles = [];
        const stars = [];
        
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1
            });
        }
        
        function initLevel() {
            invaders = [];
            const rows = 3 + level;
            const cols = 6 + Math.min(level, 4);
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    let type = 'normal', hp = 1, color = '#f0f', points = 10;
                    
                    if (row === 0) {
                        type = 'boss'; hp = 3; color = '#ff0000'; points = 50;
                    } else if (row === 1) {
                        type = 'tank'; hp = 2; color = '#ff8800'; points = 25;
                    } else if (row === rows - 1) {
                        type = 'fast'; hp = 1; color = '#00ffff'; points = 15;
                    }
                    
                    invaders.push({
                        x: 50 + col * 70,
                        y: 40 + row * 55,
                        width: 50,
                        height: 40,
                        type: type,
                        hp: hp,
                        maxHp: hp,
                        color: color,
                        points: points,
                        alive: true
                    });
                }
            }
            invaderSpeed = 0.3 + (level * 0.1);
        }
        
        initLevel();
        
        // Controls
        function moveLeft() { player.speed = -6; }
        function moveRight() { player.speed = 6; }
        function stopMove() { player.speed = 0; }
        
        function fire() {
            const now = Date.now();
            const fireRate = player.rapidFire ? 100 : 250;
            
            if (now - lastShot > fireRate) {
                lastShot = now;
                playShootSound();
                
                if (player.megaBomb) {
                    invaders.forEach(inv => {
                        if (inv.alive) {
                            inv.hp = 0;
                            inv.alive = false;
                            score += inv.points;
                            createExplosion(inv.x + inv.width/2, inv.y + inv.height/2, inv.color);
                        }
                    });
                    playExplosionSound();
                    player.megaBomb = false;
                    updatePowerUpUI();
                } else if (player.tripleShot) {
                    bullets.push({x: player.x + player.width/2, y: player.y, dx: 0, dy: -8});
                    bullets.push({x: player.x + 10, y: player.y, dx: -2, dy: -7});
                    bullets.push({x: player.x + player.width - 10, y: player.y, dx: 2, dy: -7});
                } else {
                    bullets.push({x: player.x + player.width/2, y: player.y, dx: 0, dy: -8});
                }
            }
        }
        
        // Autofire functions
        function startFire() { isFiring = true; }
        function stopFire() { isFiring = false; }
        
        // Keyboard with autofire
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
            if (e.key === ' ') isFiring = true;
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') stopMove();
            if (e.key === ' ') isFiring = false;
        });
        
        // Touch
        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            const y = e.touches[0].clientY - rect.top;
            
            if (y > canvas.height - 100) {
                if (x < canvas.width / 2) moveLeft();
                else moveRight();
            } else {
                isFiring = true;
            }
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchend', (e) => {
            stopMove();
            isFiring = false;
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            player.x = x - player.width / 2;
            e.preventDefault();
        }, {passive: false});
        
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: color
                });
            }
        }
        
        function spawnPowerUp(x, y) {
            if (Math.random() < 0.15) {
                const type = powerUpTypes[Math.floor(Math.random() * powerUpTypes.length)];
                powerUps.push({
                    x: x,
                    y: y,
                    type: type.type,
                    emoji: type.emoji,
                    duration: type.duration
                });
            }
        }
        
        function activatePowerUp(type) {
            playPowerUpSound();
            if (type === 'rapid') {
                player.rapidFire = true;
                setTimeout(() => player.rapidFire = false, 5000);
            } else if (type === 'triple') {
                player.tripleShot = true;
                setTimeout(() => player.tripleShot = false, 5000);
            } else if (type === 'shield') {
                player.shield = true;
                setTimeout(() => player.shield = false, 8000);
            } else if (type === 'bomb') {
                player.megaBomb = true;
            }
        }
        
        function updatePowerUpUI() {
            // UI update if needed
        }
        
        function nextLevel() {
            level++;
            document.getElementById('level').textContent = level;
            document.getElementById('levelScreen').style.display = 'none';
            playLevelUpSound();
            initLevel();
        }
        
        function update() {
            // Autofire
            if (isFiring) fire();
            
            player.x += player.speed;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].dx || 0;
                bullets[i].y += bullets[i].dy;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }
            
            let moveDown = false, aliveCount = 0;
            invaders.forEach(invader => {
                if (invader.alive) {
                    aliveCount++;
                    invader.x += invaderDirection * invaderSpeed;
                    if (invader.x <= 20 || invader.x >= canvas.width - 70) moveDown = true;
                }
            });
            
            if (moveDown) {
                invaderDirection *= -1;
                invaders.forEach(inv => { if (inv.alive) inv.y += 25; });
            }
            
            bullets.forEach((bullet, bIndex) => {
                invaders.forEach((invader, iIndex) => {
                    if (invader.alive &&
                        bullet.x > invader.x && bullet.x < invader.x + invader.width &&
                        bullet.y > invader.y && bullet.y < invader.y + invader.height) {
                        
                        bullets.splice(bIndex, 1);
                        invader.hp--;
                        
                        if (invader.hp <= 0) {
                            invader.alive = false;
                            score += invader.points;
                            document.getElementById('score').textContent = score;
                            
                            if (score > highscore) {
                                highscore = score;
                                localStorage.setItem('spaceInvadersAudioHighscore', highscore);
                                document.getElementById('highscore').textContent = highscore;
                            }
                            
                            createExplosion(invader.x + inv.width/2, inv.y + inv.height/2, inv.color);
                            playExplosionSound();
                            spawnPowerUp(invader.x, invader.y);
                        }
                    }
                });
            });
            
            powerUps.forEach((powerUp, index) => {
                powerUp.y += 2;
                if (powerUp.y > player.y && powerUp.y < player.y + player.height &&
                    powerUp.x > player.x && powerUp.x < player.x + player.width) {
                    activatePowerUp(powerUp.type);
                    powerUps.splice(index, 1);
                }
                if (powerUp.y > canvas.height) powerUps.splice(index, 1);
            });
            
            invaders.forEach(invader => {
                if (invader.alive && invader.y > player.y - 40) {
                    if (player.shield) {
                        player.shield = false;
                        invader.alive = false;
                        createExplosion(invader.x + invader.width/2, invader.y + invader.height/2, '#fff');
                        playExplosionSound();
                    } else {
                        lives--;
                        document.getElementById('lives').textContent = lives;
                        if (lives <= 0) {
                            alert('GAME OVER! Score: ' + score + ' | Level: ' + level);
                            location.reload();
                        } else {
                            invaders.forEach(inv => { if (inv.alive) inv.y -= 100; });
                        }
                    }
                }
            });
            
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            if (aliveCount === 0) {
                document.getElementById('nextLevel').textContent = level + 1;
                document.getElementById('levelScreen').style.display = 'block';
            }
            
            stars.forEach(star => {
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
        }
        
        function draw() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#000428');
            gradient.addColorStop(1, '#004e92');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });
            ctx.globalAlpha = 1;
            
            // Player
            ctx.fillStyle = player.shield ? '#00d9ff' : '#0f0';
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.shield ? '#00d9ff' : '#0f0';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 10, player.y - 10, 40, 10);
            ctx.shadowBlur = 0;
            
            // Bullets
            ctx.fillStyle = '#ff0';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff0';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x - 2, bullet.y, 4, 15);
            });
            ctx.shadowBlur = 0;
            
            // Invaders
            invaders.forEach(invader => {
                if (invader.alive) {
                    ctx.fillStyle = invader.color;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = invader.color;
                    ctx.fillRect(invader.x, invader.y, invader.width, invader.height);
                    
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 0;
                    ctx.fillRect(invader.x + 8, invader.y + 8, 8, 8);
                    ctx.fillRect(invader.x + 34, invader.y + 8, 8, 8);
                    ctx.fillRect(invader.x + 12, invader.y + 25, 26, 6);
                    
                    if (invader.maxHp > 1) {
                        ctx.fillStyle = '#333';
                        ctx.fillRect(invader.x, invader.y - 12, invader.width, 6);
                        ctx.fillStyle = invader.hp > 1 ? '#0f0' : '#f00';
                        ctx.fillRect(invader.x + 1, invader.y - 11, (invader.width - 2) * (invader.hp / invader.maxHp), 4);
                    }
                }
            });
            
            // Power-ups
            powerUps.forEach(powerUp => {
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(powerUp.emoji, powerUp.x, powerUp.y);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(powerUp.x, powerUp.y - 10, 20, 0, Math.PI * 2);
                ctx.stroke();
            });
            
            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x, p.y, 6, 6);
            });
            ctx.globalAlpha = 1;
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        loop();
    </script>
</body>
</html>
