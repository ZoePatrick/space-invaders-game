<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👾 Space Invaders</title>
    <style>
        * { touch-action: none; user-select: none; }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        canvas {
            border: 3px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            max-width: 100vw;
            max-height: 60vh;
        }
        .score {
            color: #0f0;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 0, 0.2);
            border: 2px solid #0f0;
            border-radius: 10px;
            font-size: 30px;
            color: #0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active { background: rgba(0, 255, 0, 0.5); }
        .fire-btn {
            width: 100px;
            height: 100px;
            background: rgba(255, 0, 0, 0.3);
            border-color: #f00;
            color: #f00;
        }
        @media (min-width: 600px) {
            .controls { display: none; }
        }
    </style>
</head>
<body>
    <div class="score">Score: <span id="score">0</span> | Leben: <span id="lives">3</span></div>
    <canvas id="game" width="600" height="500"></canvas>
    <div class="controls">
        <div class="btn" ontouchstart="moveLeft()" ontouchend="stopMove()">⬅️</div>
        <div class="btn fire-btn" ontouchstart="fire()">🔥</div>
        <div class="btn" ontouchstart="moveRight()" ontouchend="stopMove()">➡️</div>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let score = 0;
        let lives = 3;
        
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 60,
            width: 50,
            height: 30,
            speed: 0
        };
        
        const bullets = [];
        const invaders = [];
        const particles = [];
        
        // Create invaders
        for (let row = 0; row < 4; row++) {
            for (let col = 0; col < 8; col++) {
                invaders.push({
                    x: 60 + col * 60,
                    y: 50 + row * 50,
                    width: 40,
                    height: 30,
                    alive: true,
                    direction: 1
                });
            }
        }
        
        function moveLeft() { player.speed = -5; }
        function moveRight() { player.speed = 5; }
        function stopMove() { player.speed = 0; }
        function fire() {
            bullets.push({
                x: player.x + player.width / 2,
                y: player.y,
                width: 4,
                height: 10,
                speed: 8
            });
        }
        
        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft();
            if (e.key === 'ArrowRight') moveRight();
            if (e.key === ' ') fire();
        });
        document.addEventListener('keyup', stopMove);
        
        // Touch on canvas
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            const y = e.touches[0].clientY - rect.top;
            if (y > canvas.height - 100) {
                if (x < canvas.width / 2) moveLeft();
                else moveRight();
            } else {
                fire();
            }
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchend', (e) => {
            stopMove();
            e.preventDefault();
        }, {passive: false});
        
        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            player.x = x - player.width / 2;
            e.preventDefault();
        }, {passive: false});
        
        function update() {
            player.x += player.speed;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
            
            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }
            
            // Update invaders
            let moveDown = false;
            invaders.forEach(invader => {
                if (invader.alive) {
                    invader.x += invader.direction * 0.5;
                    if (invader.x <= 20 || invader.x >= canvas.width - 60) moveDown = true;
                }
            });
            
            if (moveDown) {
                invaders.forEach(invader => {
                    invader.direction *= -1;
                    invader.y += 20;
                });
            }
            
            // Collision detection
            bullets.forEach((bullet, bIndex) => {
                invaders.forEach((invader, iIndex) => {
                    if (invader.alive &&
                        bullet.x > invader.x && bullet.x < invader.x + invader.width &&
                        bullet.y > invader.y && bullet.y < invader.y + invader.height) {
                        invader.alive = false;
                        bullets.splice(bIndex, 1);
                        score += 10;
                        document.getElementById('score').textContent = score;
                        
                        // Explosion particles
                        for (let i = 0; i < 5; i++) {
                            particles.push({
                                x: invader.x + invader.width / 2,
                                y: invader.y + invader.height / 2,
                                vx: (Math.random() - 0.5) * 4,
                                vy: (Math.random() - 0.5) * 4,
                                life: 20
                            });
                        }
                    }
                });
            });
            
            // Check game over
            invaders.forEach(invader => {
                if (invader.alive && invader.y > player.y - 30) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    if (lives <= 0) {
                        alert('GAME OVER! Score: ' + score);
                        location.reload();
                    } else {
                        invaders.forEach(inv => { inv.y -= 100; });
                    }
                }
            });
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            // Check win
            if (invaders.every(inv => !inv.alive)) {
                alert('GEWONNEN! Score: ' + score);
                location.reload();
            }
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 2, 2);
            }
            
            // Draw player
            ctx.fillStyle = '#0f0';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#00d9ff';
            ctx.fillRect(player.x + 10, player.y - 10, 30, 10);
            
            // Draw bullets
            ctx.fillStyle = '#ff0';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });
            
            // Draw invaders
            invaders.forEach(invader => {
                if (invader.alive) {
                    ctx.fillStyle = '#f0f';
                    ctx.fillRect(invader.x, invader.y, invader.width, invader.height);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(invader.x + 5, invader.y + 5, 5, 5);
                    ctx.fillRect(invader.x + 30, invader.y + 5, 5, 5);
                    ctx.fillRect(invader.x + 10, invader.y + 20, 20, 5);
                }
            });
            
            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(p.x, p.y, 4, 4);
            });
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        loop();
    </script>
</body>
</html>
